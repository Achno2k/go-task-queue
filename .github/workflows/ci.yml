name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: taskqueue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Integration tests
        env:
          DB_DSN: host=localhost user=admin password=password dbname=taskqueue port=5432 sslmode=disable
          REDIS_ADDR: localhost:6379
        # The testcontainers-based tests bring up their own containers;
        # they don't need the service containers above. We still keep the
        # services running so anyone wanting to use them directly (e.g.
        # via env vars) can.
        run: go test -tags=integration -timeout=5m ./internal/integration/...

      - name: Benchmarks (smoke)
        run: go test -bench=. -benchtime=1x -run=^$ ./internal/worker/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --timeout=5m
